<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Green | Wild Hues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Wild Hues</a>
      <nav>
        <a href="index.html#colors">Colors</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <section class="gallery-hero green-page">
    <div class="hero-overlay"></div>
    <div class="container">
      <a class="back-link" href="index.html">← Back to colors</a>
      <p class="eyebrow">Color collection</p>
      <h1>Green</h1>
      <p class="hero-text">Replace these sample images with your own green photos and captions.</p>

      </figure>
      <figure class="photo-card">

      </figure>
      <figure class="photo-card">

        <figcaption>Dense canopy</figcaption>
      </figure>
      <figure class="photo-card wide">
        <img src="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?auto=format&fit=crop&w=1600&q=80" alt="Green meadow" loading="lazy">

      </figure>

    <div class="pager">
      <a href="index.html#colors">All colors</a>
