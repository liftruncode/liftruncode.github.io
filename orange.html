  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Wild Hues</a>

        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <section class="gallery-hero orange-page">
    <div class="hero-overlay"></div>
    <div class="container">
      <a class="back-link" href="index.html">← Back to colors</a>

      <h1>Orange</h1>

        <img src="https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1600&q=80" alt="Autumn reflection" loading="lazy">
