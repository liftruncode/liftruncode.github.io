<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Blue | Wild Hues</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="styles.css" />

<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Wild Hues</a>
      <nav>
        <a href="index.html#colors">Colors</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </div>
  </header>

  <section class="gallery-hero blue-page">
    <div class="hero-overlay"></div>
    <div class="container">
      <a class="back-link" href="index.html">← Back to colors</a>
      <p class="eyebrow">Color collection</p>
      <h1>Blue</h1>
      <p class="hero-text">Replace these sample images with your own blue photos and captions.</p>

    <div class="gallery-grid">
      <figure class="photo-card">

        <figcaption>Blue surf</figcaption>
      </figure>
      <figure class="photo-card">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80" alt="Alpine lake" loading="lazy">
        <figcaption>Alpine lake</figcaption>
      </figure>
      <figure class="photo-card">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80" alt="Misty ridge" loading="lazy">
        <figcaption>Misty ridge</figcaption>
      </figure>
      <figure class="photo-card wide">
        <img src="https://images.unsplash.com/photo-1439066615861-d1af74d74000?auto=format&fit=crop&w=1600&q=80" alt="Blue water and sky" loading="lazy">
        <figcaption>Blue water and sky</figcaption>
      </figure>
    </div>

    <div class="pager">
      <a href="index.html#colors">All colors</a>
      <a href="index.html#contact">Contact</a>
